<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva contraseña — GymApp</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
  .box{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:380px;border:1px solid #eee}
  .logo{font-size:28px;font-weight:700;color:#7F77DD;margin-bottom:4px}
  .sub{font-size:14px;color:#888;margin-bottom:1.5rem}
  .label{font-size:12px;color:#888;margin-bottom:4px;display:block}
  .input{width:100%;border:1px solid #ddd;border-radius:8px;padding:10px 12px;font-size:14px;outline:none;font-family:inherit;color:#1a1a1a;background:#fff;margin-bottom:12px}
  .input:focus{border-color:#7F77DD}
  .btn{width:100%;background:#7F77DD;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit;margin-top:4px}
  .btn:hover{background:#534AB7}
  .error{font-size:13px;color:#A32D2D;background:#FCEBEB;padding:8px 12px;border-radius:8px;margin-bottom:12px;display:none}
  .success{font-size:13px;color:#085041;background:#E1F5EE;padding:8px 12px;border-radius:8px;margin-bottom:12px;display:none}
  .loading{text-align:center;color:#888;font-size:14px;padding:2rem 0}
</style>
</head>
<body>
<div class="box">
  <div class="logo">GymApp</div>
  <div class="sub">Restablecer contraseña</div>
  <div id="error" class="error"></div>
  <div id="success" class="success"></div>
  <div id="loading" class="loading">Verificando enlace...</div>
  <div id="form" style="display:none">
    <label class="label">Nueva contraseña</label>
    <input class="input" type="password" id="pass1" placeholder="mínimo 6 caracteres">
    <label class="label">Repetir contraseña</label>
    <input class="input" type="password" id="pass2" placeholder="repite la contraseña">
    <button class="btn" onclick="doReset()">Guardar nueva contraseña</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://tdkpntrvbujxbgezlayg.supabase.co';
const SUPABASE_KEY = 'sb_publishable_SNsgBqoF6ZoN8JGMxtTOQw_rXV_sqYj';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}

db.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN') {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('form').style.display = 'block';
  } else {
    document.getElementById('loading').textContent = 'Enlace no válido o caducado. Pide uno nuevo desde la app.';
  }
});

async function doReset() {
  const pass1 = document.getElementById('pass1').value;
  const pass2 = document.getElementById('pass2').value;
  document.getElementById('error').style.display = 'none';
  if (!pass1 || pass1.length < 6) return showError('Mínimo 6 caracteres');
  if (pass1 !== pass2) return showError('Las contraseñas no coinciden');
  const {error} = await db.auth.updateUser({password: pass1});
  if (error) return showError('Error al cambiar la contraseña. Intenta de nuevo.');
  document.getElementById('form').style.display = 'none';
  const ok = document.getElementById('success');
  ok.textContent = 'Contraseña cambiada. Volviendo a la app...';
  ok.style.display = 'block';
  setTimeout(() => {
    window.location.href = 'https://gymapp-smoky-pi.vercel.app';
  }, 2000);
}
</script>
</body>
</html>
